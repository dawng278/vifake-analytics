services:
  - type: web
    name: vifake-api
    runtime: python
    repo: https://github.com/dawng278/vifake-analytics.git
    branch: main
    plan: free
    buildCommand: pip install --no-cache-dir -r requirements-deploy.txt
    startCommand: python -m uvicorn backend_services.api_gateway.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: AUTH_TOKEN
        value: "demo-token-123"
      - key: PYTHONPATH
        value: /opt/render/project/src
